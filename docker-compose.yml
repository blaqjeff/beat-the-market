services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: beat
      POSTGRES_PASSWORD: beat
      POSTGRES_DB: beat_the_market
    volumes:
      - beat_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beat -d beat_the_market"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  beat_pg_data:
