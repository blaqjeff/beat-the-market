# Pings the free Render worker so it does not sleep (15m idle limit).
# Runs on GitHub's free Actions minutes — $0.
name: keep-alive-worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping worker health
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 90 "https://beat-the-market-worker.onrender.com/health"; then
              echo
              echo "ok"
              exit 0
            fi
            echo "attempt $i failed; retrying..."
            sleep 15
          done
          exit 1
