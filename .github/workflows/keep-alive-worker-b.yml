# Second keep-alive lane (GitHub Actions free tier).
# Paired with keep-alive-worker.yml + in-process self-ping on Render.
# If one cron drifts, the other still wakes the free web service.
name: keep-alive-worker-b

on:
  schedule:
    # Same cadence; Actions schedules are not exact, so two jobs
    # reduce the chance of a full 15m gap.
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping worker health
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 90 "https://beat-the-market-worker.onrender.com/health"; then
              echo
              echo "ok"
              exit 0
            fi
            echo "attempt $i failed; retrying..."
            sleep 15
          done
          exit 1
